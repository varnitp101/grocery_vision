<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Modern Clinical Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#FFB300",
                        "primary-hover": "#FFCA28",
                        "navy-deep": "#020617",
                        "navy-surface": "#0F172A",
                        "navy-accent": "#1E293B",
                        "google-blue": "#4285F4"
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        @layer base {
            html, body {
                height: 100%;
                overflow: hidden;
                background-color: #020617;
            }
            *:focus-visible {
                outline: 4px solid #FFB300 !important;
                outline-offset: 4px;
            }
        }
        .touch-target-large {
            min-height: 88px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display text-white selection:bg-primary selection:text-black flex flex-col h-screen">
<div aria-live="polite" class="sr-only" role="status">
        Login Screen. Clinical design. Enter email and password. Action buttons are at the bottom.
    </div>
<header class="flex-none pt-12 pb-4 px-8 flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="w-2 h-10 bg-primary rounded-full shadow-[0_0_15px_rgba(255,179,0,0.4)]"></div>
<h1 class="text-3xl font-extrabold tracking-tight text-white uppercase">Login</h1>
</div>
<div class="text-primary/40">
<span class="material-symbols-outlined text-4xl">medical_services</span>
</div>
</header>
<main class="flex-grow flex flex-col px-6 justify-center">
<form action="#" class="w-full max-w-md mx-auto space-y-6" method="POST" onsubmit="event.preventDefault()">
<div class="bg-navy-surface border border-navy-accent rounded-[2rem] p-6 shadow-2xl space-y-6">
<div class="space-y-2 group">
<label class="block text-sm font-bold text-primary uppercase tracking-[0.2em] pl-1" for="email">
                        Email Address
                    </label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none">
<span class="material-icons-round text-3xl text-slate-500 group-focus-within:text-primary transition-colors">alternate_email</span>
</div>
<input aria-required="true" autocomplete="email" class="block w-full h-[88px] pl-16 pr-6 bg-navy-deep border-2 border-navy-accent rounded-2xl text-xl text-white placeholder-slate-600 focus:border-primary focus:ring-0 transition-all" id="email" name="email" placeholder="name@clinic.com" type="email"/>
</div>
</div>
<div class="space-y-2 group">
<label class="block text-sm font-bold text-primary uppercase tracking-[0.2em] pl-1" for="password">
                        Password
                    </label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none">
<span class="material-icons-round text-3xl text-slate-500 group-focus-within:text-primary transition-colors">lock_person</span>
</div>
<input aria-required="true" autocomplete="current-password" class="block w-full h-[88px] pl-16 pr-6 bg-navy-deep border-2 border-navy-accent rounded-2xl text-xl text-white placeholder-slate-600 focus:border-primary focus:ring-0 transition-all" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
</div>
<div class="flex justify-center">
<button class="text-slate-400 font-semibold text-lg hover:text-primary transition-colors py-2" type="button">
                    Forgot Password?
                </button>
</div>
</form>
</main>
<footer class="flex-none p-6 space-y-4 bg-navy-surface border-t border-navy-accent shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
<button aria-label="Log In" class="w-full h-[88px] bg-primary hover:bg-primary-hover active:scale-[0.98] transition-all rounded-2xl flex items-center justify-center gap-3 shadow-lg shadow-primary/10" type="submit">
<span class="text-2xl font-black text-black uppercase tracking-widest">Log In</span>
<span class="material-icons-round text-3xl text-black">login</span>
</button>
<button aria-label="Sign in with Google" class="w-full h-[88px] bg-white hover:bg-slate-100 active:scale-[0.98] transition-all rounded-2xl flex items-center justify-center gap-4 border-2 border-slate-200" type="button">
<svg class="w-8 h-8" viewBox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-xl font-bold text-navy-deep">Sign in with Google</span>
</button>
<div class="h-6"></div>
</footer>

</body></html>
