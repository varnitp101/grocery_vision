<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Modern Clinical Home Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#FFBF00", // Amber
                        "background-navy": "#0F172A", // Deep Navy
                        "surface-navy": "#1E293B", // Slightly lighter navy for surface contrast
                        "text-light": "#F8FAFC", // Off-white text
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "3xl": "1.5rem", "4xl": "2.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        *:focus-visible {
            outline: 4px solid #FFBF00;
            outline-offset: 4px;
        }
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            height: 100vh;
            overflow: hidden;
        }
        .modern-clinical-shadow {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-navy font-display text-text-light flex flex-col h-full selection:bg-primary selection:text-black">
<div aria-live="polite" class="sr-only" role="status">
        Home screen. Tap or speak to scan.
    </div>
<header class="flex-none pt-14 px-6 pb-4 flex justify-between items-center z-10 w-full">
<div class="flex items-center gap-2">
<div class="h-2 w-2 bg-primary rounded-full animate-pulse"></div>
<span class="text-xs font-bold tracking-widest text-slate-400 uppercase">System Ready</span>
</div>
<button aria-label="Profile" class="p-2 rounded-full bg-surface-navy text-slate-300 hover:text-white transition-colors">
<span class="material-icons-round text-2xl">person</span>
</button>
</header>
<main class="flex-grow px-6 pb-6 w-full flex flex-col gap-6 overflow-y-auto">
<button aria-label="Tap or speak to scan product" class="flex-grow w-full bg-primary rounded-4xl modern-clinical-shadow active:scale-[0.98] transition-transform duration-200 flex flex-col items-center justify-center relative overflow-hidden group">
<div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(#000 1px, transparent 1px); background-size: 20px 20px;"></div>
<div class="relative z-10 flex flex-col items-center gap-6">
<div class="flex gap-4 items-center justify-center">
<div class="w-16 h-16 bg-black rounded-2xl flex items-center justify-center shadow-lg">
<span class="material-icons-round text-4xl text-primary">mic</span>
</div>
<div class="w-20 h-20 bg-black rounded-3xl flex items-center justify-center shadow-xl transform scale-110">
<span class="material-icons-round text-5xl text-primary">photo_camera</span>
</div>
<div class="w-16 h-16 bg-black rounded-2xl flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-4xl text-primary">barcode_scanner</span>
</div>
</div>
<h1 class="text-4xl font-bold text-black text-center leading-tight tracking-tight mt-4 max-w-[80%]">
                    TAP OR SPEAK<br/>TO SCAN
                </h1>
</div>
<div class="absolute bottom-8 left-1/2 -translate-x-1/2 flex flex-col items-center gap-1">
<span class="text-black/60 text-sm font-semibold uppercase tracking-widest">Active</span>
<div class="w-12 h-1 bg-black/20 rounded-full overflow-hidden">
<div class="w-full h-full bg-black/40 animate-[shimmer_2s_infinite]"></div>
</div>
</div>
</button>
<div class="flex-none grid grid-cols-1 gap-4 h-32">
<button class="bg-surface-navy rounded-3xl flex flex-col items-center justify-center gap-3 active:bg-slate-700 transition-colors border border-slate-700/50 shadow-lg group w-full h-full">
<span class="material-icons-round text-3xl text-primary group-hover:scale-110 transition-transform">shopping_cart</span>
<span class="font-bold text-lg tracking-wide">My Cart</span>
</button>
</div>
</main>
<nav class="flex-none bg-surface-navy border-t border-slate-700/50 pb-8 pt-4 w-full z-20 shadow-[0_-4px_20px_rgba(0,0,0,0.2)]">
<div class="grid grid-cols-3 w-full px-2">
<button aria-label="Home" class="flex flex-col items-center justify-center gap-1.5 p-2 rounded-2xl active:bg-white/5 transition-colors">
<span class="material-icons-round text-2xl text-primary">home</span>
<span class="text-[0.65rem] font-bold tracking-wider uppercase text-primary">Home</span>
</button>
<button aria-label="Cart" class="flex flex-col items-center justify-center gap-1.5 p-2 rounded-2xl active:bg-white/5 group transition-colors">
<span class="material-icons-round text-2xl text-slate-400 group-hover:text-white transition-colors">shopping_cart</span>
<span class="text-[0.65rem] font-bold tracking-wider uppercase text-slate-400 group-hover:text-white transition-colors">Cart</span>
</button>
<button aria-label="Settings" class="flex flex-col items-center justify-center gap-1.5 p-2 rounded-2xl active:bg-white/5 group transition-colors">
<span class="material-icons-round text-2xl text-slate-400 group-hover:text-white transition-colors">settings</span>
<span class="text-[0.65rem] font-bold tracking-wider uppercase text-slate-400 group-hover:text-white transition-colors">Settings</span>
</button>
</div>
</nav>
</body></html>
