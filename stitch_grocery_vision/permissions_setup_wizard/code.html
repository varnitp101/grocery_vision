<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Modern Permissions Setup</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Noto+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    "primary": "#ffa200", // High contrast amber
                    "navy-deep": "#0f172a", // Deep Navy (Slate 900) - Solid background
                    "navy-card": "#1e293b", // Slate 800
                    "navy-surface": "#334155", // Slate 700
                },
                fontFamily: {
                    "display": ["Space Grotesk", "sans-serif"],
                    "body": ["Noto Sans", "sans-serif"],
                },
                boxShadow: {
                    'soft': '0 20px 40px -15px rgba(0, 0, 0, 0.4)',
                    'glow': '0 0 15px rgba(255, 162, 0, 0.2)',
                }
            },
        },
    }
</script>
<style>
    .material-symbols-outlined {
      font-variation-settings:
      'FILL' 1,
      'wght' 500,
      'GRAD' 0,
      'opsz' 24
    }
    .no-scrollbar::-webkit-scrollbar {
        display: none;
    }
    .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
    }
    body {
        min-height: 100vh;
        background-color: #0f172a;}
</style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-navy-deep text-white font-display antialiased flex flex-col h-screen overflow-hidden selection:bg-primary selection:text-navy-deep">
<header class="w-full pt-12 pb-6 px-6 flex flex-col items-center shrink-0 z-10">
<div class="flex items-center gap-2 mb-8">
<div class="h-1.5 w-12 bg-primary rounded-full shadow-glow"></div>
<div class="h-1.5 w-12 bg-navy-surface rounded-full"></div>
</div>
<h1 class="text-2xl font-bold tracking-tight text-white mb-2 text-center">Permissions Setup</h1>
<p class="text-slate-400 text-sm font-medium tracking-wide text-center">Step 1 of 2</p>
</header>
<main class="flex-1 w-full max-w-md mx-auto px-6 flex flex-col justify-start pt-4 relative z-10">
<div class="w-full bg-navy-card rounded-[32px] shadow-soft border border-white/10 overflow-hidden divide-y divide-white/5">
<div class="relative p-6 flex items-center justify-between gap-4 bg-gradient-to-b from-white/[0.02] to-transparent">
<div class="flex items-center gap-4 flex-1 min-w-0">
<div class="shrink-0 h-14 w-14 rounded-2xl bg-navy-deep border border-white/10 flex items-center justify-center text-primary ring-1 ring-white/5 shadow-inner">
<span class="material-symbols-outlined text-[28px]">photo_camera</span>
</div>
<div class="flex flex-col gap-1">
<div class="flex items-center gap-2">
<h2 class="text-lg font-bold text-white leading-none">Camera</h2>
<span aria-label="Not granted" class="material-symbols-outlined text-red-500 text-[20px]">cancel</span>
</div>
<p class="text-slate-400 text-xs font-body font-medium leading-snug">
                        Identify products.
                    </p>
</div>
</div>
<button class="shrink-0 h-10 px-6 bg-navy-surface hover:bg-slate-600 active:scale-95 text-white text-xs font-bold tracking-wider uppercase rounded-xl transition-all shadow-lg shadow-black/20 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-navy-card">
                Grant
            </button>
</div>
<div class="relative p-6 flex items-center justify-between gap-4 bg-gradient-to-b from-white/[0.02] to-transparent">
<div class="flex items-center gap-4 flex-1 min-w-0">
<div class="shrink-0 h-14 w-14 rounded-2xl bg-navy-deep border border-white/10 flex items-center justify-center text-primary ring-1 ring-white/5 shadow-inner">
<span class="material-symbols-outlined text-[28px]">mic</span>
</div>
<div class="flex flex-col gap-1">
<div class="flex items-center gap-2">
<h2 class="text-lg font-bold text-white leading-none">Microphone</h2>
<span aria-label="Not granted" class="material-symbols-outlined text-red-500 text-[20px]">cancel</span>
</div>
<p class="text-slate-400 text-xs font-body font-medium leading-snug">
                        Voice commands.
                    </p>
</div>
</div>
<button class="shrink-0 h-10 px-6 bg-navy-surface hover:bg-slate-600 active:scale-95 text-white text-xs font-bold tracking-wider uppercase rounded-xl transition-all shadow-lg shadow-black/20 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-navy-card">
                Grant
            </button>
</div>
</div>
<div class="mt-8 px-6 text-center">
<p class="text-slate-500 text-xs font-body leading-relaxed">
            These permissions are essential for the assistant to guide you safely. Double-tap buttons to activate.
        </p>
</div>
</main>
<footer class="fixed bottom-0 left-0 right-0 z-30 shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
<button class="w-full h-[88px] bg-primary border-t border-white/10 flex items-center justify-center gap-3 transition-colors group relative overflow-hidden rounded-none active:bg-amber-600">
<span class="text-lg font-bold tracking-[0.15em] uppercase text-navy-deep group-hover:text-navy-deep/80 transition-colors relative z-10">Continue</span>
<span class="material-symbols-outlined text-2xl text-navy-deep relative z-10">arrow_forward</span>
</button>
</footer>

</body></html>
