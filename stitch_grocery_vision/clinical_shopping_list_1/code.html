<div class="flex-shrink-0 pt-16 pb-6 flex flex-col items-center justify-center space-y-4">

        </h1>
</div>
<div class="flex-1 flex flex-col items-center justify-center w-full gap-10">
<div class="w-full bg-primary rounded-4xl p-10 flex flex-col items-center text-center shadow-[0_20px_60px_-15px_rgba(0,0,0,0.5)] transform transition-transform relative overflow-hidden group">

</div>

<div class="absolute -top-24 -right-24 w-48 h-48 bg-white/20 rounded-full blur-3xl pointer-events-none"></div>
</div>

</div>
</div>

<span class="material-symbols-outlined text-3xl font-bold transition-transform group-hover:-translate-x-1">shopping_cart</span>

        </button>
