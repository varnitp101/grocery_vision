<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Onboarding - Offline Mode</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#FFB300","primary-hover": "#F59E0B",
                        "navy-deep": "#0B1221","navy-surface": "#162032","text-main": "#FFFFFF",
                        "text-muted": "#94A3B8",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    boxShadow: {
                        "subtle": "0 10px 40px -5px rgba(0, 0, 0, 0.4)",
                        "inner-glow": "inset 0 1px 0 0 rgba(255, 255, 255, 0.1)"
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "2xl": "1rem", "3xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>*:focus-visible {
            outline: 4px solid #FFB300;
            outline-offset: 4px;
        }
        body {
            background-color: #0B1221;
        }
    </style>
<style>
    body {
      min-height: max(600px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-navy-deep text-text-main font-display overflow-hidden h-screen w-full flex flex-col justify-between">
<div aria-live="polite" class="sr-only" role="status">
        Onboarding screen 3 of 3. Offline Mode.
    </div>
<div class="flex-1 flex flex-col items-center pt-8 px-6 relative z-10 w-full max-w-md mx-auto">
<div aria-label="Step 3 of 3" aria-valuemax="3" aria-valuemin="1" aria-valuenow="3" class="flex w-full max-w-[180px] flex-row items-center justify-center gap-2 py-6" role="progressbar">
<div class="h-1.5 flex-1 rounded-full bg-navy-surface"></div>
<div class="h-1.5 flex-1 rounded-full bg-navy-surface"></div>
<div class="h-1.5 flex-1 rounded-full bg-primary"></div>
</div>
<div class="flex flex-col items-center justify-center gap-8 w-full flex-1 pb-4">
<div class="relative flex items-center justify-center">
<div class="w-48 h-48 rounded-[2rem] bg-navy-surface shadow-subtle flex items-center justify-center relative border border-white/5">
<span class="material-symbols-outlined text-[80px] text-primary drop-shadow-md" style="font-variation-settings: 'FILL' 1, 'wght' 300, 'GRAD' 0, 'opsz' 48;">
                        cloud_off
                    </span>
<div class="absolute top-6 right-6 h-3 w-3 bg-red-500 rounded-full shadow-[0_0_12px_rgba(239,68,68,0.6)]"></div>
</div>
</div>
<div class="text-center space-y-4">
<h1 class="text-4xl font-bold tracking-tight leading-[1.1] text-white">
                    Offline Mode
                </h1>
<p class="text-lg text-text-muted font-light leading-relaxed max-w-[280px] mx-auto">
                    Your lists are saved locally. <br/>No signal required.
                </p>
</div>
</div>
</div>
<div class="h-[32vh] w-full flex flex-col justify-end bg-navy-deep">
<button aria-label="Get Started. Final page. The app works without internet. Double-tap the bottom half to finish setup and go to Login." class="group relative flex w-full h-full cursor-pointer items-center justify-center overflow-hidden rounded-t-[2.5rem] rounded-b-none bg-primary hover:bg-primary-hover active:bg-amber-600 transition-colors duration-200 shadow-[0_-4px_30px_rgba(255,179,0,0.15)]">
<div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(#000 1px, transparent 1px); background-size: 24px 24px;"></div>
<div class="flex flex-col items-center gap-2 z-10 translate-y-2">
<span class="text-navy-deep text-2xl font-bold tracking-widest uppercase font-display">
                    Get Started
                </span>
<span class="material-symbols-outlined text-navy-deep opacity-80 group-hover:opacity-100 transition-opacity transform group-hover:translate-y-1 duration-300 text-3xl">
                    keyboard_arrow_down
                </span>
</div>
</button>
</div>
