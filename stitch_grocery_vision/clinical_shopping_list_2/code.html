<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>My Cart</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ffa200",
                        "navy": "#050f25",
                        "navy-light": "#0f2042",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        :focus-visible {
            outline: 4px solid #ffa200;
            outline-offset: 2px;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        @keyframes pulse-border {
            0% { border-color: rgba(255, 162, 0, 0.4); box-shadow: 0 0 0 0 rgba(255, 162, 0, 0.4); }
            50% { border-color: rgba(255, 162, 0, 1); box-shadow: 0 0 0 6px rgba(255, 162, 0, 0); }
            100% { border-color: rgba(255, 162, 0, 0.4); box-shadow: 0 0 0 0 rgba(255, 162, 0, 0); }
        }
        .animate-pulse-border {
            animation: pulse-border 2s infinite;
        }
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-navy font-display h-[100dvh] flex flex-col text-white selection:bg-primary selection:text-navy overflow-hidden">
<div class="shrink-0 flex items-center justify-between p-4 pt-12 pb-2 bg-navy border-b border-white/20 z-10">
<button aria-label="Go back" class="flex size-12 shrink-0 items-center justify-center rounded-full border border-white/30 hover:bg-white/10 active:bg-white/20 transition-colors">
<span class="material-symbols-outlined text-3xl">arrow_back</span>
</button>
<h1 class="text-2xl font-bold tracking-tight text-center flex-1 text-white uppercase">My Cart</h1>
<button aria-label="Menu" class="flex size-12 shrink-0 items-center justify-center rounded-full border border-white/30 hover:bg-white/10 active:bg-white/20 transition-colors">
<span class="material-symbols-outlined text-3xl">more_vert</span>
</button>
</div>
<div class="shrink-0 p-4 bg-navy border-b border-white/10 z-10 shadow-lg space-y-4">
<div class="w-full bg-navy-light border-2 border-primary rounded-xl p-4 flex justify-between items-center shadow-md">
<div class="flex flex-col items-center flex-1 border-r border-white/10">
<span class="text-white/70 text-xs font-bold uppercase tracking-widest mb-1">Items</span>
<span class="text-primary text-4xl font-bold tracking-tighter">5</span>
</div>
<div class="flex flex-col items-center flex-1">
<span class="text-white/70 text-xs font-bold uppercase tracking-widest mb-1">Total</span>
<span class="text-primary text-4xl font-bold tracking-tighter">$24.50</span>
</div>
</div>
<div class="flex items-center justify-between bg-white/5 rounded-lg p-2 px-3 border border-white/10">
<span class="text-sm font-bold uppercase tracking-wider text-white/90">Sort by Aisle</span>
<button aria-checked="false" class="relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 bg-white/20" role="switch">
<span aria-hidden="true" class="pointer-events-none inline-block h-5 w-5 transform rounded-full bg-white shadow ring-0 transition duration-200 ease-in-out translate-x-0"></span>
</button>
</div>
</div>
<div aria-label="Shopping Cart Items" class="flex-1 overflow-y-auto no-scrollbar p-4 flex flex-col gap-4" role="list">
<div class="relative w-full bg-navy border-4 border-primary rounded-2xl p-4 pt-10 flex flex-col gap-4 shadow-[0_0_30px_rgba(255,162,0,0.15)] scale-[1.02] transform transition-transform z-10" role="listitem">
<div class="absolute top-0 right-0 bg-primary rounded-bl-xl rounded-tr-[0.8rem] px-4 py-2 z-10 border-2 border-primary animate-pulse-border">
<span class="text-navy text-lg font-bold uppercase tracking-wider block">Aisle 4</span>
</div>
<div class="flex items-start justify-between gap-3 mb-2">
<div class="flex-1 min-w-0">
<h2 class="text-primary text-3xl font-bold leading-tight mb-2 truncate" id="prod-1-name">Organic Bananas</h2>
<span class="sr-only">in Aisle 4</span>
<p class="text-white text-xl font-medium tracking-wide" id="prod-1-price">$1.29 <span class="text-white/60 mx-1">•</span> Dole</p>
</div>
</div>
<div class="flex flex-col gap-2 p-2 bg-white/5 rounded-xl border border-white/10">
<div class="text-center text-sm font-bold uppercase tracking-widest text-white/70 mb-1">Quantity</div>
<div class="flex items-center justify-between gap-4">
<button aria-label="Decrease quantity" class="size-16 min-w-[64px] min-h-[64px] rounded-xl bg-navy-light border-2 border-white/30 hover:border-primary hover:bg-white/10 active:bg-primary active:text-navy flex items-center justify-center transition-all">
<span class="material-symbols-outlined text-4xl font-bold">remove</span>
</button>
<span class="text-5xl font-bold text-white tabular-nums tracking-tighter">1</span>
<button aria-label="Increase quantity" class="size-16 min-w-[64px] min-h-[64px] rounded-xl bg-navy-light border-2 border-white/30 hover:border-primary hover:bg-white/10 active:bg-primary active:text-navy flex items-center justify-center transition-all">
<span class="material-symbols-outlined text-4xl font-bold">add</span>
</button>
</div>
</div>
<button aria-label="Remove Organic Bananas from cart" class="w-full py-4 rounded-xl bg-white/5 border-2 border-white/40 text-white font-bold tracking-wider uppercase flex items-center justify-center gap-3 hover:bg-red-900/40 hover:border-red-400 hover:text-red-100 active:bg-red-900/60 transition-colors mt-2">
<span class="material-symbols-outlined text-3xl">delete</span>
<span class="text-lg">Remove Item</span>
</button>
</div>
<div class="relative w-full bg-navy border-2 border-white/30 rounded-2xl p-4 pt-10 flex flex-col gap-4 shadow-sm opacity-80" role="listitem">
<div class="absolute top-0 right-0 bg-primary/80 rounded-bl-xl rounded-tr-[0.8rem] px-3 py-1 z-10">
<span class="text-navy text-sm font-bold uppercase tracking-wider block">Aisle 12</span>
</div>
<div class="flex items-start justify-between gap-3">
<div class="flex-1 min-w-0">
<h2 class="text-white/90 text-2xl font-bold leading-tight mb-1 truncate">Almond Milk</h2>
<span class="sr-only">in Aisle 12</span>
<p class="text-white/70 text-lg font-medium tracking-wide">$4.50 <span class="text-white/40 mx-1">•</span> Silk</p>
</div>
<div class="flex flex-col items-center justify-center bg-white/5 border border-white/20 rounded-lg p-2 min-w-[3.5rem]">
<span class="text-[0.65rem] uppercase font-bold text-white/50">Qty</span>
<span class="text-2xl font-bold text-white/80">1</span>
</div>
</div>
<button aria-label="Remove Almond Milk from cart" class="w-full py-3 rounded-lg border border-white/20 text-white/70 font-bold tracking-wider uppercase flex items-center justify-center gap-2 hover:bg-red-900/30 hover:border-red-400 hover:text-red-200 active:bg-red-900/50 transition-colors">
<span class="material-symbols-outlined">delete</span>
                Remove
            </button>
</div>
<div class="relative w-full bg-navy border-2 border-white/30 rounded-2xl p-4 pt-10 flex flex-col gap-4 shadow-sm opacity-80" role="listitem">
<div class="absolute top-0 right-0 bg-primary/80 rounded-bl-xl rounded-tr-[0.8rem] px-3 py-1 z-10">
<span class="text-navy text-sm font-bold uppercase tracking-wider block">Aisle 15</span>
</div>
<div class="flex items-start justify-between gap-3">
<div class="flex-1 min-w-0">
<h2 class="text-white/90 text-2xl font-bold leading-tight mb-1 truncate">Sourdough Bread</h2>
<span class="sr-only">in Aisle 15</span>
<p class="text-white/70 text-lg font-medium tracking-wide">$3.99 <span class="text-white/40 mx-1">•</span> Bakery</p>
</div>
<div class="flex flex-col items-center justify-center bg-white/5 border border-white/20 rounded-lg p-2 min-w-[3.5rem]">
<span class="text-[0.65rem] uppercase font-bold text-white/50">Qty</span>
<span class="text-2xl font-bold text-white/80">1</span>
</div>
</div>
<button aria-label="Remove Sourdough Bread from cart" class="w-full py-3 rounded-lg border border-white/20 text-white/70 font-bold tracking-wider uppercase flex items-center justify-center gap-2 hover:bg-red-900/30 hover:border-red-400 hover:text-red-200 active:bg-red-900/50 transition-colors">
<span class="material-symbols-outlined">delete</span>
                Remove
            </button>
</div>
<div class="relative w-full bg-navy border-2 border-white/30 rounded-2xl p-4 pt-10 flex flex-col gap-4 shadow-sm opacity-80" role="listitem">
<div class="absolute top-0 right-0 bg-primary/80 rounded-bl-xl rounded-tr-[0.8rem] px-3 py-1 z-10">
<span class="text-navy text-sm font-bold uppercase tracking-wider block">Aisle 2</span>
</div>
<div class="flex items-start justify-between gap-3">
<div class="flex-1 min-w-0">
<h2 class="text-white/90 text-2xl font-bold leading-tight mb-1 truncate">Baby Spinach</h2>
<span class="sr-only">in Aisle 2</span>
<p class="text-white/70 text-lg font-medium tracking-wide">$2.99 <span class="text-white/40 mx-1">•</span> Organic</p>
</div>
<div class="flex flex-col items-center justify-center bg-white/5 border border-white/20 rounded-lg p-2 min-w-[3.5rem]">
<span class="text-[0.65rem] uppercase font-bold text-white/50">Qty</span>
<span class="text-2xl font-bold text-white/80">2</span>
</div>
</div>
<button aria-label="Remove Baby Spinach from cart" class="w-full py-3 rounded-lg border border-white/20 text-white/70 font-bold tracking-wider uppercase flex items-center justify-center gap-2 hover:bg-red-900/30 hover:border-red-400 hover:text-red-200 active:bg-red-900/50 transition-colors">
<span class="material-symbols-outlined">delete</span>
                Remove
            </button>
</div>
<div class="h-24"></div>
</div>
<div class="fixed bottom-0 left-0 right-0 bg-navy border-t border-white/20 p-4 pb-8 z-50 shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
<button class="w-full py-5 rounded-xl bg-primary text-navy shadow-lg hover:bg-yellow-400 active:scale-[0.99] transition-all flex items-center justify-center gap-3">
<span class="material-symbols-outlined text-4xl">add_circle</span>
<span class="text-2xl font-bold uppercase tracking-widest">Add New Item</span>
</button>
</div>

</body></html>
