<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Unified Accessibility Settings</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#FFC107",
                        "primary-content": "#000000",
                        "background-light": "#f6f7f8",
                        "background-dark": "#111a21",

                        "acc-black": "#000000",
                        "acc-surface": "#121212",
                        "acc-highlight": "#2A2A2A",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "3xl": "1.5rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>.slider-track-amber {
            background: linear-gradient(to right, #FFC107 0%, #FFC107 50%, #333333 50%, #333333 100%);
        }
        .slider-track-pitch {
            background: linear-gradient(to right, #FFC107 0%, #FFC107 70%, #333333 70%, #333333 100%);
        }.min-touch-target {
            min-height: 88px;
        }
        body {
            min-height: max(884px, 100dvh);background-color: #000000;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-white font-display antialiased selection:bg-primary selection:text-black h-full min-h-screen">
<div class="relative flex h-full min-h-screen w-full flex-col max-w-md mx-auto overflow-x-hidden">
<header class="flex items-end px-6 pt-16 pb-8 justify-between sticky top-0 z-20 bg-acc-black/95 backdrop-blur-sm border-b border-white/10">
<h1 class="text-[28px] font-bold tracking-tight text-white leading-none">Accessibility &amp; Voice</h1>
<div class="h-12 w-12 rounded-full border-2 border-white/20 flex items-center justify-center bg-acc-surface">
<span class="material-symbols-outlined text-primary" style="font-size: 28px;">graphic_eq</span>
</div>
</header>
<main class="flex flex-col gap-5 px-4 pb-80 w-full">
<div class="group min-touch-target flex w-full items-center justify-between gap-4 rounded-3xl bg-acc-surface p-6 pr-8 shadow-[0_4px_20px_rgba(255,193,7,0.05)] border border-white/10 active:border-primary/50 transition-colors">
<div class="flex flex-col gap-1 flex-1">
<label class="text-2xl font-bold text-white leading-tight" for="ai-toggle">AI Voice Assistant</label>
<span class="text-lg text-gray-400 font-medium">Verbose descriptions</span>
</div>
<div class="relative shrink-0">
<input checked="" class="peer sr-only" id="ai-toggle" type="checkbox"/>
<div class="h-10 w-16 rounded-full bg-[#3c4953] peer-checked:bg-primary transition-all duration-300"></div>
<div class="absolute left-1 top-1 h-8 w-8 rounded-full bg-white shadow-md transition-all duration-300 peer-checked:translate-x-6"></div>
</div>
</div>
<div class="group min-touch-target flex w-full flex-col gap-5 rounded-3xl bg-acc-surface p-6 shadow-[0_4px_20px_rgba(255,193,7,0.05)] border border-white/10">
<span class="text-2xl font-bold text-white">Voice Profile</span>
<div class="flex w-full gap-3 h-14">
<button class="flex-1 rounded-xl bg-acc-highlight border border-white/10 text-white font-medium active:bg-primary active:text-black transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-black">Male</button>
<button class="flex-1 rounded-xl bg-primary border border-primary text-black font-bold shadow-[0_0_15px_rgba(255,193,7,0.3)]">Female</button>
<button class="flex-1 rounded-xl bg-acc-highlight border border-white/10 text-white font-medium active:bg-primary active:text-black transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-black">Neutral</button>
</div>
</div>
<div class="group min-touch-target flex w-full flex-col gap-6 rounded-3xl bg-acc-surface p-6 shadow-[0_4px_20px_rgba(255,193,7,0.05)] border border-white/10">
<div class="flex w-full items-end justify-between">
<span class="text-2xl font-bold text-white">Speech Rate</span>
<span class="text-3xl font-bold text-primary tracking-tighter">1.2x</span>
</div>
<div class="relative h-14 w-full cursor-pointer touch-none select-none flex items-center">
<div class="absolute w-full h-6 bg-[#2a2a2a] rounded-full overflow-hidden">
<div class="h-full bg-primary w-[50%] rounded-l-full"></div>
</div>
<div class="absolute left-[50%] h-10 w-10 -ml-5 rounded-full bg-white shadow-[0_0_0_6px_rgba(255,193,7,0.3)] flex items-center justify-center z-10">
<div class="h-2 w-2 rounded-full bg-black"></div>
</div>
<input aria-label="Speech Rate" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-20" max="2.0" min="0.5" step="0.1" type="range" value="1.2"/>
</div>
</div>
<div class="group min-touch-target flex w-full flex-col gap-6 rounded-3xl bg-acc-surface p-6 shadow-[0_4px_20px_rgba(255,193,7,0.05)] border border-white/10">
<div class="flex w-full items-end justify-between">
<span class="text-2xl font-bold text-white">Voice Pitch</span>
<span class="text-3xl font-bold text-primary tracking-tighter">High</span>
</div>
<div class="relative h-14 w-full cursor-pointer touch-none select-none flex items-center">
<div class="absolute w-full h-6 bg-[#2a2a2a] rounded-full overflow-hidden">
<div class="h-full bg-primary w-[70%] rounded-l-full"></div>
</div>
<div class="absolute left-[70%] h-10 w-10 -ml-5 rounded-full bg-white shadow-[0_0_0_6px_rgba(255,193,7,0.3)] flex items-center justify-center z-10">
<div class="h-2 w-2 rounded-full bg-black"></div>
</div>
<input aria-label="Voice Pitch" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-20" max="100" min="0" step="10" type="range" value="70"/>
</div>
</div>
<div class="group min-touch-target flex w-full flex-col gap-6 rounded-3xl bg-acc-surface p-6 shadow-[0_4px_20px_rgba(255,193,7,0.05)] border border-white/10">
<div class="flex w-full items-end justify-between">
<span class="text-2xl font-bold text-white">Vibration Intensity</span>
<span class="text-2xl font-bold text-white/60">High</span>
</div>
<div class="flex w-full gap-2 h-16">
<button aria-label="Low Intensity" class="flex-1 rounded-xl bg-acc-highlight border-2 border-transparent active:border-primary active:bg-[#333] transition-all"></button>
<button aria-label="Medium Intensity" class="flex-1 rounded-xl bg-acc-highlight border-2 border-transparent active:border-primary active:bg-[#333] transition-all"></button>
<button aria-label="High Intensity (Selected)" class="flex-1 rounded-xl bg-primary border-2 border-white shadow-[0_0_15px_rgba(255,193,7,0.5)] flex items-center justify-center relative overflow-hidden">
<div class="absolute inset-0 flex items-center justify-center opacity-40 gap-1.5">
<div class="w-1.5 h-6 bg-black rounded-full"></div>
<div class="w-1.5 h-10 bg-black rounded-full"></div>
<div class="w-1.5 h-6 bg-black rounded-full"></div>
</div>
</button>
</div>
</div>
<button class="group min-touch-target flex w-full items-center justify-between gap-4 rounded-3xl bg-acc-surface p-6 pr-4 shadow-[0_4px_20px_rgba(255,193,7,0.05)] border border-white/10 active:bg-[#1a1a1a] transition-colors text-left">
<div class="flex flex-col gap-1">
<span class="text-2xl font-bold text-white">Language</span>
<span class="text-lg text-primary font-medium">English (US)</span>
</div>
<div class="h-12 w-12 rounded-full bg-acc-highlight flex items-center justify-center group-active:bg-primary group-active:text-black transition-colors">
<span class="material-symbols-outlined text-white group-active:text-black" style="font-size: 36px;">arrow_forward</span>
</div>
</button>
</main>
<div class="fixed bottom-0 left-0 right-0 px-6 pb-6 pt-12 bg-gradient-to-t from-black via-black via-80% to-transparent z-30 max-w-md mx-auto flex flex-col gap-4">
<button class="w-full h-20 rounded-2xl bg-primary hover:bg-amber-400 text-black text-2xl font-bold tracking-wide shadow-[0_0_20px_rgba(255,193,7,0.3)] active:scale-[0.98] transition-all flex items-center justify-center gap-3">
<span class="material-symbols-outlined" style="font-size: 32px;">play_arrow</span>
            TEST VOICE
        </button>
<button aria-label="Reset Settings to Defaults" class="w-full min-h-[88px] rounded-2xl border border-white/20 bg-acc-surface/50 hover:bg-white/5 active:bg-white/10 text-red-500 text-xl font-bold tracking-wide flex items-center justify-center gap-3 transition-colors backdrop-blur-sm">
<span class="material-symbols-outlined" style="font-size: 28px;">restart_alt</span>
            RESET TO DEFAULTS
        </button>
</div>
</div>

</body></html>
