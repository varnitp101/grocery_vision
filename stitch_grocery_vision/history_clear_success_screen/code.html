<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Forgot Password Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ffaa00",
                        "background-light": "#1C1C1E",
                        "background-dark": "#1C1C1E",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>*:focus-visible {
            outline: 4px solid #ffaa00;
            outline-offset: 4px;
        }
    </style>
<style>
        body {
          min-height: max(800px, 100dvh);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark text-white font-display antialiased overflow-hidden selection:bg-primary selection:text-black">
<div class="relative flex h-screen w-full flex-col justify-between p-6 pb-12 safe-area-inset-bottom">
<header class="mt-8 w-full">
<h1 class="text-5xl font-bold uppercase leading-[1.1] tracking-tight text-white break-words" tabindex="0">
                Forgot<br/>Password
            </h1>
</header>
<main class="flex w-full flex-col justify-center flex-grow py-8">
<div class="w-full space-y-2">
<label class="sr-only" for="email">Enter your Email</label>
<input class="w-full h-24 rounded-lg bg-transparent border-[4px] border-white text-white text-2xl font-bold px-6 placeholder-gray-400 focus:border-primary focus:ring-0 uppercase tracking-wide" id="email" placeholder="Enter your Email" type="email"/>
</div>
</main>
<div class="w-full mt-auto flex flex-col gap-6">
<button class="flex w-full cursor-pointer items-center justify-center rounded-lg h-[88px] bg-primary text-[#000000] hover:bg-[#e69900] active:scale-[0.98] transition-all duration-200">
<span class="text-2xl font-black tracking-wide uppercase">SEND RESET LINK</span>
</button>
<button class="flex w-full cursor-pointer items-center justify-center rounded-lg h-20 bg-transparent border-[4px] border-white text-white hover:bg-white/10 active:scale-[0.98] transition-all duration-200">
<span class="text-xl font-bold tracking-wide uppercase">BACK TO LOGIN</span>
</button>
</div>
</div>

</body></html>
