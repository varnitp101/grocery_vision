<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TalkBack Scan Error</title>

<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#17b0cf",
                        "background-light": "#f9fafa",
                        "background-dark": "#16181d",
                        "error-clinical": "#B00020",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>

        .high-contrast-focus:focus-visible {
            outline: 4px solid #FFFFFF;
            outline-offset: 4px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-error-clinical text-white min-h-screen flex flex-col antialiased selection:bg-white selection:text-error-clinical">


<div aria-live="assertive" class="sr-only" role="alert">
        Item not found. Please move the phone closer and double-tap to try again.
    </div>

<div class="flex-1 flex flex-col relative overflow-hidden">

<div class="flex-1 flex flex-col items-center justify-center p-6 text-center z-10">

<div class="mb-8 relative">
<div class="absolute inset-0 bg-white/10 rounded-full blur-xl transform scale-150"></div>
<span class="material-symbols-outlined text-white relative z-10" style="font-size: 84px; font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;">
                    search_off
                </span>
</div>

<h1 class="text-white text-[40px] font-extrabold leading-[1.1] tracking-tight mb-4 uppercase">
                Item<br/>Not Found
            </h1>

<p class="text-white text-xl font-medium leading-relaxed max-w-[280px] mx-auto opacity-90">
                Please move the phone closer to the product.
            </p>
</div>


<div class="w-full h-[45vh] p-4 pb-6 flex items-end justify-center bg-gradient-to-t from-black/20 to-transparent">
<button aria-label="Retry Scan. Double tap to try again." class="group relative w-full h-full bg-white text-error-clinical rounded-2xl shadow-2xl flex flex-col items-center justify-center overflow-hidden high-contrast-focus active:scale-[0.98] transition-all duration-200">

<div class="absolute inset-0 bg-gray-50 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
<div class="relative z-10 flex flex-col items-center gap-2">
<span class="material-symbols-outlined text-[56px] font-bold group-active:rotate-[360deg] transition-transform duration-700 ease-out">
                        refresh
                    </span>
<span class="text-4xl font-black tracking-widest uppercase mt-2">Retry</span>
<span class="text-sm font-bold tracking-wider uppercase text-error-clinical/60 mt-1">
                        Double tap screen
                    </span>
</div>
</button>
</div>

<div class="absolute inset-0 pointer-events-none opacity-[0.03]" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCwQfB9W2AseCi52Y_u9dntHyOgNIFwH_HOoVPwBYJ4YpPP2x15c0s_rN8hQk7k4hQYdjUYP_MboUb8ObpttkOVM7CetB0n8Eo9A0xVgwlem5e44jnyi5-RVy1Wcly7Tsz1DgG_dV7_YuMFr0esp5UD_xMu6AvEyJIMETmk-rijMZl_kIjoGENJKMTVlRy1IWj52SMZo4f6sgTsbFR_jJ4rSOKlAW-yQ0pbqoVNrJtWJmJrE5v6iyWWrOsaSlzida7aPRc33vv9aTPD');"></div>
</div>
</body></html>
