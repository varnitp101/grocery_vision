<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Reset Confirmation Dialog</title>

<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;700;800&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ffaa00",
                        "background-light": "#f8f7f5",
                        "background-dark": "#231c0f",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px"},
                    spacing: {
                        '88': '88px',
                    }
                },
            },
        }
    </script>
<style>

        .text-shadow-sm {
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }
        .modal-shadow {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.9);
        }

        .touch-target-xl {
            min-height: 88px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased overflow-hidden selection:bg-primary selection:text-black">

<div class="relative h-screen w-full flex flex-col items-center justify-center overflow-hidden">

<div aria-hidden="true" class="absolute inset-0 w-full h-full flex flex-col opacity-30 dark:opacity-20 blur-[6px] pointer-events-none">

<div class="flex items-center justify-between p-6 border-b border-gray-300 dark:border-gray-700">
<span class="material-symbols-outlined text-3xl dark:text-white">arrow_back</span>
<h2 class="text-xl font-bold dark:text-white">Accessibility</h2>
<span class="material-symbols-outlined text-3xl dark:text-white">help</span>
</div>

<div class="flex-1 p-4 space-y-4">
<div class="h-20 w-full bg-white dark:bg-[#1a1a1a] rounded-xl flex items-center px-4 shadow-sm">
<div class="h-10 w-10 rounded-full bg-gray-200 dark:bg-gray-700"></div>
<div class="ml-4 h-4 w-40 bg-gray-200 dark:bg-gray-700 rounded"></div>
</div>
<div class="h-20 w-full bg-white dark:bg-[#1a1a1a] rounded-xl flex items-center px-4 shadow-sm">
<div class="h-10 w-10 rounded-full bg-gray-200 dark:bg-gray-700"></div>
<div class="ml-4 h-4 w-56 bg-gray-200 dark:bg-gray-700 rounded"></div>
</div>
<div class="h-20 w-full bg-white dark:bg-[#1a1a1a] rounded-xl flex items-center px-4 shadow-sm">
<div class="h-10 w-10 rounded-full bg-gray-200 dark:bg-gray-700"></div>
<div class="ml-4 h-4 w-32 bg-gray-200 dark:bg-gray-700 rounded"></div>
</div>

<div class="h-40 w-full bg-gray-300 dark:bg-gray-800 rounded-xl relative overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-r from-gray-400 to-gray-300 dark:from-gray-800 dark:to-gray-700"></div>
</div>
</div>
</div>

<div class="absolute inset-0 bg-black/80 backdrop-blur-sm z-40"></div>


<div aria-describedby="modal-desc" aria-labelledby="modal-title" aria-modal="true" class="relative z-50 w-full max-w-[90%] md:max-w-md mx-4 animate-in fade-in zoom-in-95 duration-200 ease-out" role="alertdialog">

<div class="bg-black border-[6px] border-primary rounded-xl modal-shadow flex flex-col p-6 md:p-8 relative overflow-hidden">

<div class="absolute top-0 right-0 w-32 h-32 opacity-10 pointer-events-none" style="background-image: repeating-linear-gradient(45deg, #ffaa00 0, #ffaa00 2px, transparent 0, transparent 50%); background-size: 10px 10px;">
</div>

<div class="flex justify-center mb-6">
<div class="h-20 w-20 rounded-full bg-primary/20 flex items-center justify-center border-2 border-primary">
<span class="material-symbols-outlined text-primary text-5xl" style="font-variation-settings: 'FILL' 1, 'wght' 700, 'GRAD' 0, 'opsz' 48;">
                            warning
                        </span>
</div>
</div>

<h1 class="text-white text-center text-3xl md:text-4xl font-extrabold leading-none tracking-tight uppercase mb-4 text-shadow-sm" id="modal-title">
                    Reset All <br/> <span class="text-primary">Settings?</span>
</h1>

<div class="w-16 h-1.5 bg-primary/30 mx-auto rounded-full mb-5"></div>

<p class="text-white/90 text-center text-lg md:text-xl font-normal leading-relaxed mb-10 px-2" id="modal-desc">
                    This will return all voice and vibration settings to normal.
                </p>

<div class="flex flex-col gap-4 w-full">


<button class="group relative w-full h-88 bg-primary rounded-lg flex items-center justify-center overflow-hidden transition-transform active:scale-[0.98] focus:outline-none focus:ring-4 focus:ring-primary/50 focus:ring-offset-2 focus:ring-offset-black">

<div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
<div class="flex flex-col items-center justify-center relative z-10">
<span class="text-black text-2xl font-bold tracking-widest uppercase">Yes, Reset</span>

<span class="text-black/60 text-xs font-semibold tracking-wider mt-0.5">Confirm Action</span>
</div>

<span class="material-symbols-outlined absolute right-6 text-black/40 text-3xl group-hover:text-black/70 transition-colors">
                            check_circle
                        </span>
</button>


<button class="w-full h-88 bg-transparent border-[3px] border-white/30 text-white rounded-lg flex items-center justify-center hover:bg-white/5 hover:border-white transition-colors active:scale-[0.98] focus:outline-none focus:ring-4 focus:ring-white/30 focus:ring-offset-2 focus:ring-offset-black">
<span class="text-xl font-bold tracking-widest uppercase">Cancel</span>
</button>
</div>

<div class="absolute bottom-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary/20 to-transparent"></div>
</div>
</div>

<div class="h-8 w-full shrink-0"></div>
</div>
</body></html>
