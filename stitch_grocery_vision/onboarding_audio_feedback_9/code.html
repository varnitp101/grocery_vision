<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Product Scan Result</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ffbf00","navy-deep": "#0A1929","navy-card": "#132F4C","surface-light": "#ffffff",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "1rem", 
                        "2xl": "1.5rem",
                        "3xl": "2rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        *:focus-visible {
            outline: 4px solid #ffbf00;
            outline-offset: 2px;
            z-index: 50;
        }
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }button {
            min-height: 48px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-navy-deep font-display text-white flex flex-col h-[100dvh] overflow-hidden selection:bg-primary selection:text-black p-4 gap-4">
<div aria-live="assertive" class="sr-only" role="status">
        Result found: Whole Milk, 1 Liter. Brand: Great Value. Price: 3 dollars and 50 cents. Add to cart, details, repeat info, and scan next options available.
    </div>
<header class="w-full flex justify-between items-center z-10 shrink-0 h-14">
<button aria-label="Close result" class="p-3 rounded-full bg-navy-card text-white hover:bg-white/10 transition-colors border border-white/10 active:scale-95">
<span class="material-icons-round text-2xl">close</span>
</button>
<button aria-label="View Scan History" class="p-3 rounded-full bg-navy-card text-white hover:bg-white/10 transition-colors border border-white/10 active:scale-95">
<span class="material-icons-round text-2xl">history</span>
</button>
</header>
<main class="flex-1 w-full bg-navy-card rounded-3xl p-6 flex flex-col items-center justify-between border border-white/5 shadow-xl relative overflow-hidden">
<div class="absolute top-4 right-4 bg-green-500/20 text-green-400 px-3 py-1.5 rounded-full font-bold text-xs flex items-center gap-1 border border-green-500/50">
<span class="material-icons-round text-sm">check_circle</span> 98% MATCH
        </div>
<div class="flex-1 w-full flex items-center justify-center p-2 min-h-0">
<img alt="Whole Milk Bottle" class="max-h-full max-w-full object-contain drop-shadow-2xl" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCoAFCS31gdFSEFHvQlULfmxQ9cTD25J5P8V3cetSTteZEVvqSRYn1yPaTG4BNaREfBGTQwr-9FsuO-wTQGN7a_LzNS_U7eJbYmfqvP51yfasOciy63pCKj5aTlu_FbQYjJsAkK3hjUPdm6RAnMygU0pw2jDNP6XrVK8rl4grEFn9A47E4T_NUygxGlbRk1z107-Zx7PNppGIyn4avkaN9PRT83OJYRi5rH54g4wsF5VeXe7pVuNNnEfZisG_G044fQZ1AF7Fe9eftj"/>
</div>
<div class="w-full text-center mt-4">
<h1 class="text-2xl sm:text-3xl font-bold text-white leading-tight mb-1 line-clamp-2">
                Whole Milk, 1L
            </h1>
<p class="text-lg font-medium text-gray-400 tracking-wide mb-2">
                Great Value
            </p>
<p class="text-4xl font-bold text-primary tracking-tighter">
                $3.50
            </p>
</div>
</main>
<nav class="flex flex-col gap-3 w-full shrink-0 pb-2">
<div class="grid grid-cols-2 gap-3 h-20">
<button aria-label="Add to cart" class="bg-navy-card border border-white/20 rounded-2xl flex flex-col items-center justify-center hover:bg-white/5 active:bg-white/10 transition-all group">
<span class="material-icons-round text-2xl text-primary mb-1 group-hover:scale-110 transition-transform">add_shopping_cart</span>
<span class="text-xs font-bold tracking-widest uppercase text-white">Add to Cart</span>
</button>
<button aria-label="Show more details" class="bg-navy-card border border-white/20 rounded-2xl flex flex-col items-center justify-center hover:bg-white/5 active:bg-white/10 transition-all group">
<span class="material-icons-round text-2xl text-white mb-1 group-hover:scale-110 transition-transform">info</span>
<span class="text-xs font-bold tracking-widest uppercase text-white">Details</span>
</button>
</div>
<div class="grid grid-cols-2 gap-3 h-20">
<button aria-label="Repeat product information" class="bg-gray-700/50 border border-white/10 rounded-2xl flex flex-col items-center justify-center hover:bg-gray-700 active:bg-gray-600 transition-all group">
<span class="material-icons-round text-2xl text-white/90 mb-1 group-hover:scale-110 transition-transform">volume_up</span>
<span class="text-xs font-bold tracking-widest uppercase text-white/90">Repeat</span>
</button>
<button aria-label="Scan next item" class="bg-primary rounded-2xl flex flex-col items-center justify-center hover:bg-[#e6ac00] active:bg-[#cc9900] transition-all text-black shadow-lg shadow-primary/20 group">
<span class="material-icons-round text-2xl font-bold text-black mb-1 group-hover:scale-110 transition-transform">photo_camera</span>
<span class="text-xs font-black tracking-widest uppercase text-black">Scan Next</span>
</button>
</div>
</nav>

</body></html>
