<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Reset Success Notification</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#ffaa00",
              "background-light": "#fafafa",
              "background-dark": "#000000",
            },
            fontFamily: {
              "display": ["Lexend", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            screens: {
              'xs': '375px',
            }
          },
        },
      }
    </script>
<style>

        .material-symbols-outlined.extra-bold {
          font-variation-settings:
          'FILL' 1,
          'wght' 700,
          'GRAD' 0,
          'opsz' 48
        }


        html, body {
            height: 100%;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark text-white font-display overflow-hidden flex flex-col h-full antialiased selection:bg-primary selection:text-black">

<main aria-label="Success. All settings have been returned to default. Double tap the bottom button to return to settings." class="flex-1 flex flex-col items-center justify-center w-full max-w-md mx-auto px-6 relative">

<div class="flex flex-col items-center justify-center gap-8 mb-16 animate-fade-in">

<div class="relative flex items-center justify-center">

<div class="absolute inset-0 bg-primary/20 blur-xl rounded-full transform scale-110"></div>
<div class="relative w-40 h-40 rounded-full border-[6px] border-primary flex items-center justify-center bg-black z-10">
<span class="material-symbols-outlined extra-bold text-white text-[80px]">
                        check
                    </span>
</div>
</div>

<div class="text-center space-y-2">
<h1 class="text-6xl font-black tracking-tighter text-white uppercase leading-none">
                    Success
                </h1>
<p class="text-xl font-medium text-white/90 leading-relaxed max-w-[280px] mx-auto">
                    Settings have been reset
                </p>
</div>
</div>


<div class="absolute top-8 left-6 w-4 h-4 border-t-4 border-l-4 border-primary/40 rounded-tl-lg"></div>
<div class="absolute top-8 right-6 w-4 h-4 border-t-4 border-r-4 border-primary/40 rounded-tr-lg"></div>
</main>

<footer class="w-full max-w-md mx-auto px-4 pb-8 pt-4 bg-background-dark z-20">
<button aria-label="Back to settings" class="w-full bg-primary hover:bg-primary/90 active:scale-[0.98] transition-all duration-150 rounded-xl flex items-center justify-center h-[88px] group ring-offset-2 ring-offset-black focus:outline-none focus:ring-4 focus:ring-white">
<span class="text-black text-2xl font-black tracking-wider uppercase group-hover:tracking-widest transition-all">
                Back to Settings
            </span>

<span aria-hidden="true" class="material-symbols-outlined text-black ml-3 text-3xl font-bold">
                arrow_forward
            </span>
</button>
</footer>
</body></html>
