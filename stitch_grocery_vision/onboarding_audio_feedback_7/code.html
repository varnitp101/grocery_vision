<!DOCTYPE html>

<html class="" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Welcome Vision Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ffbf00",
                        "background-light": "#f0f0f0", 
                        "background-dark": "#0a0a0a",
                        "surface-dark": "#1a1a1a",
                        "surface-light": "#ffffff",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        *:focus-visible {
            outline: 4px solid #ffbf00;
            outline-offset: 4px;
        }
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        html, body {
            height: 100%;
            overflow: hidden;
        }.material-symbols-thick {
          font-variation-settings: 'FILL' 0, 'wght' 700;
        }
    </style>
<style>
        body {
          min-height: max(884px, 100dvh);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-gray-900 dark:text-white flex flex-col h-full selection:bg-primary selection:text-black">
<div aria-live="polite" class="sr-only" role="status">
        Page 1 of 3. AI Vision Assistant. This app helps you identify groceries using your camera. Voice help enabled. Buttons are located at the bottom of the screen.
    </div>
<header class="flex-none px-6 pt-12 pb-4 flex justify-between items-center z-10">
<div aria-label="Progress: Step 1 of 3" class="flex space-x-2">
<div class="h-3 w-16 bg-primary rounded-full shadow-[0_0_12px_rgba(255,191,0,0.8)]"></div>
<div class="h-3 w-8 bg-gray-600 dark:bg-gray-800 rounded-full border border-gray-700"></div>
<div class="h-3 w-8 bg-gray-600 dark:bg-gray-800 rounded-full border border-gray-700"></div>
</div>
<span class="text-sm font-bold tracking-widest uppercase text-gray-500 dark:text-gray-400">Step 1/3</span>
</header>
<main class="flex-grow flex flex-col justify-evenly items-center px-6 relative z-0 pb-4">
<div aria-hidden="true" class="relative">
<div class="absolute inset-0 bg-primary/20 rounded-full blur-3xl transform scale-150 animate-pulse"></div>
<div class="relative border-[6px] border-gray-800 bg-surface-dark w-56 h-56 rounded-[2.5rem] flex items-center justify-center shadow-2xl overflow-hidden">
<span class="material-symbols-outlined text-[9rem] text-primary material-symbols-thick relative z-10 drop-shadow-lg">visibility</span>
</div>
</div>
<div class="text-center max-w-sm space-y-4">
<h1 class="text-5xl font-extrabold tracking-tight text-black dark:text-white leading-[1.1]">
                AI Vision <br/> <span class="text-primary">Assistant</span>
</h1>
<p class="text-xl text-gray-600 dark:text-gray-300 font-medium leading-relaxed">
                This app helps you identify groceries using your camera.
            </p>
</div>
<div class="flex items-center gap-2 px-4 py-2 bg-surface-dark border border-gray-700 rounded-full shadow-lg">
<span class="material-icons-round text-primary text-xl">graphic_eq</span>
<span class="text-xs font-bold uppercase tracking-wider text-gray-400">Voice Help Available</span>
</div>
</main>
<footer class="flex-none h-[32vh] w-full flex border-t-4 border-surface-dark bg-surface-dark relative">
<div class="absolute left-1/2 top-0 bottom-0 w-3 -ml-1.5 bg-black z-30 shadow-2xl pointer-events-none"></div>
<button aria-label="Skip onboarding" class="group w-1/2 h-full relative bg-[#121212] hover:bg-[#1f1f1f] active:bg-black transition-colors focus:z-20 flex flex-col items-center justify-center gap-6 touch-manipulation">
<div class="p-5 rounded-full border-[3px] border-gray-600 group-hover:border-white transition-colors bg-surface-dark">
<span class="material-icons-round text-5xl text-gray-400 group-hover:text-white">fast_forward</span>
</div>
<span class="text-3xl font-bold text-gray-400 uppercase tracking-widest group-hover:text-white">Skip</span>
</button>
<button aria-label="Continue to next step" class="group w-1/2 h-full relative bg-primary hover:bg-[#e6ac00] active:bg-[#cc9900] transition-colors focus:z-20 flex flex-col items-center justify-center gap-6 touch-manipulation">
<div class="p-5 rounded-full border-[4px] border-black/30 group-hover:border-black/50 transition-colors bg-white/10">
<span class="material-icons-round text-5xl text-black font-black">arrow_forward</span>
</div>
<span class="text-3xl font-black text-black uppercase tracking-widest">Next</span>
</button>
</footer>
</body></html>
